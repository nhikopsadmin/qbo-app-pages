<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QBO Authorization Callback</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
           max-width: 720px; margin: 60px auto; padding: 20px; line-height: 1.6; color: #1f2937; }
    h1 { color: #1f4e78; }
    .meta { color: #6b7280; font-size: 14px; }
    .code-block { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 6px;
                  padding: 14px 16px; margin: 14px 0; word-break: break-all;
                  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-size: 13px; }
    .label { font-weight: 600; color: #374151; margin-top: 16px; display: block; }
    button { background: #1f4e78; color: white; border: 0; padding: 8px 14px;
             border-radius: 6px; cursor: pointer; font-size: 13px; margin-left: 8px; }
    button:hover { background: #163b5a; }
    .ok { color: #047857; }
    .err { color: #b91c1c; padding: 12px; background: #fee2e2; border-radius: 6px; }
  </style>
</head>
<body>
  <h1 id="title">QBO Authorization Captured</h1>
  <p class="meta" id="subtitle">Copy the values below into your terminal where the OAuth setup script is waiting.</p>

  <div id="ok-section">
    <span class="label">Authorization Code</span>
    <div class="code-block" id="code">—</div>
    <button onclick="copyTo('code')">Copy</button>

    <span class="label">Realm ID (Company ID)</span>
    <div class="code-block" id="realmId">—</div>
    <button onclick="copyTo('realmId')">Copy</button>

    <p class="meta" style="margin-top: 24px;">Paste both values into your terminal when prompted. You can close this tab afterward.</p>
  </div>

  <div id="err-section" style="display: none;">
    <div class="err" id="errmsg"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const realmId = params.get('realmId');
    const error = params.get('error');

    if (error) {
      document.getElementById('title').textContent = 'Authorization Error';
      document.getElementById('subtitle').textContent = '';
      document.getElementById('ok-section').style.display = 'none';
      document.getElementById('err-section').style.display = 'block';
      document.getElementById('errmsg').textContent = 'Error: ' + error +
        (params.get('error_description') ? ' — ' + params.get('error_description') : '');
    } else if (code && realmId) {
      document.getElementById('code').textContent = code;
      document.getElementById('realmId').textContent = realmId;
    } else {
      document.getElementById('title').textContent = 'No Authorization Data';
      document.getElementById('subtitle').textContent = 'Visit this page only after authorizing the app via Intuit.';
      document.getElementById('ok-section').style.display = 'none';
    }

    function copyTo(id) {
      const text = document.getElementById(id).textContent;
      navigator.clipboard.writeText(text).then(() => {
        // brief visual confirm
        const b = event.target;
        const orig = b.textContent;
        b.textContent = 'Copied ✓';
        setTimeout(() => { b.textContent = orig; }, 1500);
      });
    }
  </script>
</body>
</html>
